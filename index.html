    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" href="https://i.postimg.cc/6p19JCWR/Gemini-Generated-Image-u73pfku73pfku73p-(1)-(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/6p19JCWR/Gemini-Generated-Image-u73pfku73pfku73p-(1)-(1).png">
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=2')
            .then(reg => {
              console.log('SW registered');
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker == null) return;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      console.log('New content available; please refresh.');
                      window.location.reload();
                    }
                  }
                };
              };
            })
            .catch(err => console.log('SW error', err));
        });
      }
    </script>
    
    <!-- Open Graph / Social Media -->

    <meta property="og:title" content="SK BURGERS | O Autêntico Sabor Premium de Manaus" />
    <meta property="og:description" content="Peça o melhor burger de Manaus agora! Ingredientes selecionados, sabor inigualável e entrega rápida." />
